services:
  qwen30b_quantized:
    image: nvcr.io/nvidia/vllm:25.09-py3
    container_name: qwen30b_quantized

    network_mode: "host"
    ipc: "host"

    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
      - VLLM_CACHE_DIR=/root/.cache/vllm
      - VLLM_ATTENTION_BACKEND=FLASHINFER

    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864

    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./vllm-cache:/root/.cache/vllm

    command: >
      python -m vllm.entrypoints.openai.api_server
        --model RedHatAI/Qwen3-30B-A3B-quantized.w4a16
        --host 0.0.0.0
        --port 8000
        --dtype auto
        --tensor-parallel-size 1
        --max-model-len 4096
        --gpu-memory-utilization 0.3
        --swap-space 16
        --max-num-seqs 2
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder

    restart: unless-stopped

  riva_speech:
    image: nvcr.io/nvidia/riva/riva-speech:2.17.0-l4t-aarch64
    container_name: riva_speech
    restart: unless-stopped

    pull_policy: never

    command: ["/bin/bash", "/opt/om1/start_riva.sh"]

    ipc: host
    runtime: nvidia

    ports:
      - "15051:50051"
      - "15000:50000"

    environment:
      - RIVA_SERVER_HTTP_PORT=50000
      - NMT_REMOTE_ASR_SERVICE=0.0.0.0:50051
      - NMT_REMOTE_TTS_SERVICE=0.0.0.0:50051
      - LD_PRELOAD=
      - RIVA_API_KEY=${RIVA_API_KEY}
      - RIVA_API_NGC_ORG=${RIVA_API_NGC_ORG:-openmind-1}
      - RIVA_EULA=${RIVA_EULA:-accept}
      # Set to 0 if you want request-level ASR/TTS logs from Riva.
      - GLOG_minloglevel=0
      # Start om1_speech (mic -> ASR logs + TTS HTTP) inside this container.
      - START_OM1_SPEECH=1
      # Keep startup clean on minimal images; ASR still runs (mic -> text logs).
      - OM1_SPEECH_ARGS=--disable-tts

    volumes:
      - ${HOME}/riva_quickstart_arm64_v2.17.0/model_repository/models:/data/models
      - ./scripts/start_riva_nocurl.sh:/opt/om1/start_riva.sh:ro
      - ../src:/opt/om1/src:ro

    devices:
      - /dev/bus/usb:/dev/bus/usb:rwm
      - /dev/snd:/dev/snd:rwm

    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864

    security_opt:
      - label:disable

  embedding:
      image: openmindagi/embedding_service:e5-small-v2-aarch64
      container_name: embedding_service
      ports:
        - "8100:8100"
      runtime: nvidia
      restart: unless-stopped
